<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPS | EAZY VIBES</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/components/header.css">
    <link rel="stylesheet" href="/css/components/footer.css">
    <link rel="stylesheet" href="/css/tops.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>

<!-- HEADER DÙNG CHUNG -->
<div th:replace="components/header :: header"></div>

<main class="tops-container">

    <div class="page-top-bar">
        <h1 class="category-title">TOPS</h1>

        <div class="sort-box">
            <select id="sort-select" onchange="fetchTops()">
                <option value="newest">MỚI NHẤT</option>
                <option value="price_asc">GIÁ: TĂNG DẦN</option>
                <option value="price_desc">GIÁ: GIẢM DẦN</option>
                <option value="best_selling">BÁN CHẠY NHẤT</option>
            </select>
        </div>
    </div>

    <div class="horizontal-filter">
        <div class="filter-item label">
            <span class="material-symbols-outlined">filter_list</span>
            <span>BỘ LỌC</span>
        </div>

        <div class="filter-item">
            <select id="filter-price" onchange="fetchTops()">
                <option value="">GIÁ SẢN PHẨM</option>
                <option value="0-500000">Dưới 500,000đ</option>
                <option value="500000-1000000">500,000đ - 1,000,000đ</option>
                <option value="1000000-5000000">Trên 1,000,000đ</option>
            </select>
        </div>

        <div class="filter-item">
            <select id="filter-size" onchange="fetchTops()">
                <option value="">KÍCH THƯỚC</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
        </div>
    </div>

    <div id="tops-grid" class="product-grid"></div>

</main>

<div th:replace="components/footer :: footer"></div>

<!-- JS -->
<script src="/js/components/header.js"></script>
<script src="/js/components/footer.js"></script>
<script src="/js/tops.js"></script>

</body>
</html>
