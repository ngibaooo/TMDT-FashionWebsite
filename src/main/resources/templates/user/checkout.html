                <div class="space-y-8">
                    <div class="flex gap-6 items-start bg-white p-6 border border-gray-200 shadow-sm">

                        <textarea class="w-full border-0 border-b border-gray-300 bg-transparent py-2 focus:ring-0 focus:border-black text-sm uppercase resize-none h-24" placeholder="GHI CHÚ ĐƠN HÀNG (TÙY CHỌN)"></textarea>

                    </div>

                                THANH TOÁN KHI NHẬN HÀNG (COD)
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input class="peer hidden" name="payment" type="radio"/>
