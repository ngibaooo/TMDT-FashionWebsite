<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>EAZY VIBES | ĐĂNG NHẬP</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#ffffff", surface: "#000000" },
                    fontFamily: { headline: ["Space Grotesk"], body: ["Inter"] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="dark bg-surface text-primary overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-md flex justify-between items-center px-8 h-20 border-b border-zinc-800">
        <div class="flex-1"></div>
        <div class="flex-1 flex justify-center">
            <a th:href="@{/}" class="text-3xl md:text-5xl font-extrabold text-white tracking-tighter font-headline uppercase">EAZY VIBES</a>
        </div>
        <div class="flex-1 flex justify-end">
            <a th:href="@{/}" class="text-[10px] font-bold tracking-widest uppercase text-zinc-400 hover:text-white transition-all font-headline">QUAY LẠI CỬA HÀNG</a>
        </div>
    </header>

    <main class="flex min-h-screen pt-20">
        <div class="hidden lg:block w-1/2 relative overflow-hidden bg-black border-r border-zinc-800">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop" 
                 class="w-full h-full object-cover opacity-50" alt="Login Background"/>
            <div class="absolute inset-0 flex items-center justify-center p-20">
                <h2 class="text-[10rem] font-black text-white leading-[0.8] tracking-tighter font-headline uppercase select-none opacity-20">
                    CỔNG<br/>ĐĂNG<br/>NHẬP.
                </h2>
            </div>
        </div>

        <div class="w-full lg:w-1/2 flex flex-col justify-center px-8 md:px-24 py-12">
            <div class="max-w-md w-full mx-auto">
                <p class="text-[10px] font-bold tracking-[0.3em] text-zinc-500 uppercase mb-4">XÁC THỰC TÀI KHOẢN</p>
                <h1 class="text-5xl font-black font-headline tracking-tighter uppercase mb-12 text-white">ĐĂNG NHẬP</h1>

                <form action="#" class="space-y-8">
                    <div class="relative group">
                        <input type="email" id="email" 
                               class="w-full border-b border-zinc-800 bg-transparent py-4 focus:outline-none focus:border-white transition-colors uppercase text-xs tracking-widest text-white placeholder:text-zinc-600"
                               placeholder="ĐỊA CHỈ EMAIL"/>
                    </div>

                    <div class="relative group">
                        <input type="password" id="password" 
                               class="w-full border-b border-zinc-800 bg-transparent py-4 focus:outline-none focus:border-white transition-colors uppercase text-xs tracking-widest text-white placeholder:text-zinc-600"
                               placeholder="MẬT KHẨU"/>
                        <button type="button" class="absolute right-0 top-1/2 -translate-y-1/2 text-[10px] font-bold text-zinc-500 hover:text-white uppercase tracking-tighter">QUÊN?</button>
                    </div>

                    <button type="submit" class="w-full bg-white text-black py-6 font-bold text-sm tracking-[0.2em] uppercase hover:bg-zinc-200 transition-all mt-12">
                        ĐĂNG NHẬP
                    </button>
                </form>

                <div class="mt-20 pt-8 border-t border-zinc-800">
                    <p class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase mb-4">BẠN CHƯA CÓ TÀI KHOẢN?</p>
                    <a th:href="@{/register}" class="text-lg font-black font-headline uppercase tracking-tighter text-white hover:opacity-50 transition-all flex items-center gap-2">
                        TẠO TÀI KHOẢN MỚI <span class="text-2xl">→</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
