<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>THE MONOLITH | SIGN IN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            theme: { extend: { colors: { primary: "#000000", surface: "#f9f9f9" }, fontFamily: { headline: ["Space Grotesk"], body: ["Inter"] } } }
        }
    </script>
</head>
<body class="bg-surface font-body text-black antialiased overflow-x-hidden">
    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-black/10">
        <div class="flex justify-between items-center px-8 py-6 w-full max-w-screen-2xl mx-auto">
            <div class="text-2xl font-black tracking-tighter uppercase font-headline">THE MONOLITH</div>
            <a class="font-headline tracking-tighter uppercase font-bold text-gray-500 hover:text-black transition-opacity" href="index.html">BACK TO STORE</a>
        </div>
    </header>

    <main class="min-h-screen flex flex-col md:flex-row pt-[80px]">
        <div class="hidden md:flex md:w-1/2 lg:w-3/5 bg-gray-200 relative overflow-hidden h-[calc(100vh-80px)]">
            <img class="absolute inset-0 w-full h-full object-cover grayscale contrast-125 brightness-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-zq1hQDfeEB-BnYrpgzfItbjWd9GeN0tq1WRFxwZtiyZWVDAWpPbnuS-WWGJHSRgsOj5i8v9p6bbsdORtj8rCXeVjAGkDBtIKOdITAeV-zlV_OwbzFbpw9yJ6n4gUFzStrfFqiCKx3NcPwte7XMAiVpopcl_VKASnwLft5W0jCCzakzdDTDdEEherz7AXR1jRajgc02Y0U1GTOZVVSbKGNlSm4sa_XvVTeL30Fx6jU9UyFL2ssiw7UkWov1ZdttgJrvebvtiVVjD8" />
            <div class="absolute bottom-16 left-16 z-10">
                <h1 class="font-headline text-[8rem] leading-[0.8] font-black tracking-tighter text-white mix-blend-difference">SYSTEM<br />ENTRY</h1>
            </div>
        </div>

        <div class="w-full md:w-1/2 lg:w-2/5 flex flex-col justify-center px-8 md:px-16 py-20 bg-surface">
            <div class="max-w-md w-full mx-auto">
                <div class="mb-12">
                    <span class="text-[10px] tracking-[0.3em] uppercase text-gray-500 mb-4 block">AUTHENTICATION</span>
                    <h2 class="font-headline text-4xl font-black tracking-tighter uppercase text-black">SIGN IN</h2>
                </div>
                <form class="space-y-10">
                    <div class="relative">
                        <input class="block w-full px-0 py-3 bg-transparent border-0 border-b border-gray-300 focus:ring-0 focus:border-black peer text-sm" id="email" placeholder="EMAIL ADDRESS" required type="email" />
                    </div>
                    <div class="relative">
                        <input class="block w-full px-0 py-3 bg-transparent border-0 border-b border-gray-300 focus:ring-0 focus:border-black peer text-sm" id="password" placeholder="PASSWORD" required type="password" />
                        <a class="absolute right-0 top-3 text-[9px] tracking-wider uppercase text-gray-400 hover:text-black" href="#">FORGOT?</a>
                    </div>
                    <div class="pt-4">
                        <button class="w-full bg-black text-white font-headline font-black py-5 px-8 text-sm tracking-[0.2em] uppercase hover:bg-gray-800 transition-all duration-300 active:scale-95" type="submit">SIGN IN</button>
                    </div>
                </form>
                <div class="mt-16 pt-8 border-t border-gray-200">
                    <p class="text-[10px] tracking-widest uppercase text-gray-500 mb-4">NEW TO THE MONOLITH?</p>
                    <a class="font-headline font-bold text-lg tracking-tighter uppercase text-black hover:underline" href="register.html">CREATE AN ACCOUNT →</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
