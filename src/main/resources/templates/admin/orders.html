<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>EAZY VIBES | ĐƠN HÀNG</title>
    <link rel="stylesheet" href="/css/admin/orders.css">
    <link rel="stylesheet" href="/css/components/admin-sidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="admin-container">
    <div th:replace="components/admin-sidebar :: sidebar"></div>

    <div class="main-content">
        <h1>QUẢN LÝ ĐƠN HÀNG</h1>

        <div class="action-bar">
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterBy('ALL', this)">TẤT CẢ</button>
                <button class="filter-btn" onclick="filterBy('PENDING', this)">CHỜ XỬ LÝ</button>
                <button class="filter-btn" onclick="filterBy('SHIPPING', this)">ĐANG GIAO</button>
                <button class="filter-btn" onclick="filterBy('COMPLETED', this)">HOÀN TẤT</button>
                <button class="filter-btn" onclick="filterBy('CANCELLED', this)">ĐÃ HỦY</button>
            </div>

            <div class="sort-container">
                <span class="material-symbols-outlined">sort</span>
                <select id="orderSort" onchange="changeSort(this.value)">
                    <option value="neweast">Mới nhất</option>
                    <option value="price_asc">Giá: Thấp đến Cao</option>
                    <option value="price_desc">Giá: Cao đến Thấp</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>MÃ ĐƠN</th>
                        <th>KHÁCH HÀNG</th>
                        <th>NGÀY ĐẶT</th>
                        <th>TỔNG TIỀN</th>
                        <th style="text-align: center;">TRẠNG THÁI</th>
                        <th style="text-align: right;">THAO TÁC</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 50px; color: #888;">Đang tải dữ liệu đơn hàng...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="statusModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>CẬP NHẬT TRẠNG THÁI</h2>
            <p id="modalOrderIdText">Đơn hàng: #...</p>
        </div>
        <div class="status-grid">
            <button id="btn-pending" class="btn-status status-pending" onclick="confirmStatus('PENDING')">PENDING</button>
            <button id="btn-paid" class="btn-status status-paid" onclick="confirmStatus('PAID')">PAID</button>
            <button id="btn-shipping" class="btn-status status-shipping" onclick="confirmStatus('SHIPPING')">SHIPPING</button>
            <button id="btn-completed" class="btn-status status-completed" onclick="confirmStatus('COMPLETED')">COMPLETED</button>
            <button id="btn-cancelled" class="btn-status status-cancelled" onclick="confirmStatus('CANCELLED')">CANCELLED</button>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">HỦY BỎ</button>
        </div>
    </div>
</div>

<div id="orderDetailModal" class="modal-overlay">
    <div class="modal-content detail-modal">
        <div class="modal-header">
            <h2>CHI TIẾT ĐƠN HÀNG</h2>
            <p id="detailOrderId">Mã đơn: #...</p>
        </div>
        
        <div class="detail-container">
            <table class="detail-table">
                <thead>
                    <tr>
                        <th>SẢN PHẨM</th>
                        <th>PHÂN LOẠI</th>
                        <th style="text-align: center;">SL</th>
                        <th style="text-align: right;">GIÁ</th>
                    </tr>
                </thead>
                <tbody id="detailTableBody">
                    </tbody>
            </table>
        </div>

        <div class="detail-summary">
            <div class="summary-line">
                <span>Voucher giảm giá:</span>
                <b id="detailDiscount">0 ₫</b>
            </div>
            <div class="summary-line total">
                <span>TỔNG THANH TOÁN:</span>
                <b id="detailTotal">0 ₫</b>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeDetailModal()">ĐÓNG CHI TIẾT</button>
        </div>
    </div>
</div>

<script src="/js/admin/orders.js"></script>
</body>
</html>
