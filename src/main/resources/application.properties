# 1. THÔNG TIN ỨNG DỤNG
spring.application.name=fashion-shop
server.port=8080

# 2. KẾT NỐI DATABASE (Đã thêm cấu hình chống lỗi font Tiếng Việt và Timezone)
spring.datasource.url=jdbc:mysql://localhost:3306/eazy_vibes_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. CẤU HÌNH HIBERNATE / JPA (Tự động tạo bảng)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. CẤU HÌNH THYMELEAF (Tắt cache để code Giao diện nhanh hơn)
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8